services:
  workspace-deps:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack prepare pnpm@10.33.0 --activate &&
      corepack pnpm install --no-frozen-lockfile"
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - frontend_node_modules:/workspace/apps/frontend/node_modules
      - backend_node_modules:/workspace/apps/backend/node_modules

  frontend:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack prepare pnpm@10.33.0 --activate &&
      corepack pnpm --filter frontend dev --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - frontend_node_modules:/workspace/apps/frontend/node_modules
    depends_on:
      workspace-deps:
        condition: service_completed_successfully
      backend:
        condition: service_started

  backend:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -lc "corepack prepare pnpm@10.33.0 --activate &&
      corepack pnpm --filter backend prisma:generate &&
      corepack pnpm --filter backend prisma:migrate:deploy &&
      corepack pnpm --filter backend start:dev"
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/signal_lab?schema=public}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/var/log/signal-lab/backend.log}
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - backend_node_modules:/workspace/apps/backend/node_modules
      - ./tmp/logs:/var/log/signal-lab
    depends_on:
      workspace-deps:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signal_lab}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-signal_lab}"]
      interval: 5s
      timeout: 5s
      retries: 20

  prometheus:
    image: prom/prometheus:v3.7.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      workspace-deps:
        condition: service_completed_successfully
      backend:
        condition: service_started

  loki:
    image: grafana/loki:3.5.7
    command:
      - "-config.file=/etc/loki/config.yml"
    ports:
      - "3101:3100"
    volumes:
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro

  promtail:
    image: grafana/promtail:3.5.7
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./tmp/logs:/var/log/signal-lab:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:12.2.0
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: http://localhost:3100
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  grafana_data:
  root_node_modules:
  frontend_node_modules:
  backend_node_modules:
